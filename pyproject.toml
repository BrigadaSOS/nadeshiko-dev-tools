[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.metadata]
allow-direct-references = true

[project]
name = "nadeshiko-dev-tools"
version = "0.1.0"
description = "CLI utilities for anime media processing and segment generation"
requires-python = ">=3.11"
dependencies = [
    "babelfish>=0.6.1",
    "boto3>=1.35.0",
    "deepl>=1.27.0",
    "ffmpeg-python>=0.2",
    "ffsubsync>=0.4.19",
    "guessit>=3.8.0",
    "jaconvv2>=0.4",
    "langdetect>=1.0.9",
    "pysubs2>=1.8.0",
    "python-anilist>=1.0.9",
    "python-dateutil>=2.9.0.post0",
    "python-dotenv>=1.2.1",
    "questionary>=2.1.1",
    "requests>=2.32.5",
    "rich>=14.3.1",
    "nadeshiko-sdk>=0.1.0",
    "nadeshiko-internal-sdk",
]

[project.scripts]
media-sub-splitter = "nadeshiko_dev_tools.media_sub_splitter.__main__:main"
assets-uploader = "nadeshiko_dev_tools.assets_uploader.__main__:main"
format-migrator = "nadeshiko_dev_tools.migrator.__main__:main"
post-upload = "nadeshiko_dev_tools.post_upload:main"

[dependency-groups]
dev = [
    "ruff>=0.9.0",
    "pytest>=9.0.2",
    "pytest-snapshot>=0.9.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
# Remove unused imports and variables automatically
unfixable = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.uv.sources]
nadeshiko-sdk = { path = "../nadeshiko-sdk-python/sdk", editable = true }
nadeshiko-internal-sdk = { path = "../nadeshiko-sdk-python/sdk-internal", editable = true }
